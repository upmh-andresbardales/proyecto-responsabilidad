services:
  # ============================================
  # EMQX - Broker MQTT
  # ============================================
  emqx:
    image: emqx/emqx:latest
    container_name: acuaponia-emqx
    restart: unless-stopped
    ports:
      - "${MQTT_TCP_PORT:-1884}:1883"       # MQTT TCP
      - "${MQTT_WS_PORT:-8084}:8083"        # MQTT WebSocket
      - "8085:8084"      # MQTT WSS
      - "${EMQX_DASHBOARD_PORT:-18084}:18083"    # Dashboard Web
    environment:
      EMQX_NAME: acuaponia-emqx
      EMQX_HOST: 127.0.0.1
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:-public}
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    networks:
      - acuaponia-net
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MongoDB - Base de Datos
  # ============================================
  mongo:
    image: mongo:latest
    container_name: acuaponia-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27018}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-acuaponia2026}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-acuaponia}
    volumes:
      - mongo-data:/data/db
    networks:
      - acuaponia-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Simulador de Datos Sintéticos
  # ============================================
  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: acuaponia-simulator
    restart: unless-stopped
    environment:
      MQTT_BROKER_HOST: ${MQTT_BROKER_HOST:-emqx}
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-1883}
      SYSTEM_ID: ${SYSTEM_ID:-sistema-01}
      MQTT_BASE_TOPIC: ${MQTT_BASE_TOPIC:-acuaponia}
      SENSOR_PUBLISH_INTERVAL: ${SENSOR_PUBLISH_INTERVAL:-5}
    depends_on:
      emqx:
        condition: service_healthy
    networks:
      - acuaponia-net

  # ============================================
  # Backend - FastAPI
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acuaponia-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://admin:acuaponia2026@mongo:27017/acuaponia?authSource=admin}
      MONGO_DB_NAME: ${MONGO_INITDB_DATABASE:-acuaponia}
      MQTT_BROKER_HOST: ${MQTT_BROKER_HOST:-emqx}
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-1883}
      MQTT_BASE_TOPIC: ${MQTT_BASE_TOPIC:-acuaponia}
      SYSTEM_ID: ${SYSTEM_ID:-sistema-01}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:80}
    depends_on:
      mongo:
        condition: service_healthy
      emqx:
        condition: service_healthy
    networks:
      - acuaponia-net

  # ============================================
  # Frontend - Vue 3
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acuaponia-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - acuaponia-net

networks:
  acuaponia-net:
    driver: bridge

volumes:
  emqx-data:
  emqx-log:
  mongo-data:
