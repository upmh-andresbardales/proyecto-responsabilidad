services:
  # ============================================
  # EMQX - Broker MQTT
  # ============================================
  emqx:
    image: emqx/emqx:latest
    container_name: acuaponia-emqx
    restart: unless-stopped
    ports:
      - "1883:1883"      # MQTT TCP
      - "8083:8083"      # MQTT WebSocket
      - "8084:8084"      # MQTT WSS
      - "18083:18083"    # Dashboard Web
    environment:
      EMQX_NAME: acuaponia-emqx
      EMQX_HOST: 127.0.0.1
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:-public}
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    networks:
      - acuaponia-net
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MongoDB - Base de Datos
  # ============================================
  mongo:
    image: mongo:latest
    container_name: acuaponia-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-acuaponia2026}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-acuaponia}
    volumes:
      - mongo-data:/data/db
    networks:
      - acuaponia-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  acuaponia-net:
    driver: bridge

volumes:
  emqx-data:
  emqx-log:
  mongo-data:
